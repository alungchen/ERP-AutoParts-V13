    function do_search_media()
    {   
        
        ShowMedia();
        $j(".scrollable").scrollable();
        var $imgs = $j(".items img");

        $imgs.click(function() {
            var $this = $j(this);
            var rel = $this.attr("rel");
            ImgNo = parseInt(rel.rp("#PIC_", ""))-1;

	        // see if same thumb is being clicked
	        if ($j(this).hasClass("active")) { return; }
         
	        // calclulate large image's URL based on the thumbnail URL (flickr specific)
	        var url = $j(this).attr("src");
	        var MediaId = $j(this).attr("MediaId");
            $j("#btn_刪除連結").attr("MediaId" , MediaId);
            $j("#btn_刪除連結").attr("url" , url);
	        // get handle to element that wraps the image and make it semi-transparent
	        var wrap = $j("#image_wrap").fadeTo("medium", 0.5);
         
	        // the large image from www.flickr.com
	        var $iframe = $j("#iframe_show_tags");
	        
	        $iframe.attr("scrolling", "no");
         
         
	        // call this function after it's loaded
	        /***
	        img.onload = function() {
         
		        // make wrapper fully visible
		        wrap.fadeTo("fast", 1);
         
		        // change the image
		        wrap.find("img").attr("src", url);
         
	        };
	        ***/
         
	        // begin loading the image from www.flickr.com
	        //img.src = url;
	        $iframe.attr("src", "../Iframe_MEDIA_TAG/?id=" + MediaId);
	        wrap.fadeTo("fast", 1);
	        $iframe.attr("scrolling", "yes");
         
	        // activate item
	        $j(".items img").removeClass("active");
	        $j(this).addClass("active");
         
        // when page loads simulate a "click" on the first image
        })
        
        $j($imgs[0]).click();
    }

        }
    }

//        console.log("i_imgs=" + i_imgs);

//        $j( $imgs[i_imgs-1] ).click();

    function do_刪除連結(this_obj){
        
        var str_url = "Default.aspx?AJAX=1&do_action=%do_action%&id=%id%";
        var str_id = str_KeyValue;
        var dt = null;
        var $this = $j(this_obj);
        var str_MEDIA_id = $this.attr("MediaId");
 
        str_url = str_url.ReplaceAll("%do_action%", escape("ajax_do_刪除連結"));
        str_url = str_url.ReplaceAll("%id%", escape(str_MEDIA_id));

        dt = get_data(str_url, "");
        
        if (dt.getValue("flg_error") == "1") {
            alert(dt.getValue("message"));
            return (false);
        }
        else
            //alert(dt.getValue("message"));
            parent.sys_Iframe_MEDIA_refresh(str_id);

        var OldPage = GetScrollablePage();

//        console.log("OldPage=" + OldPage);
//        console.log("ImgNo=" + ImgNo);

        do_search_media();
        var $imgs = $j("#display_grid_scrollable img");

        if ($imgs.length % 5 == 0)
        {
//            console.log("$imgs.length % 5=" + $imgs.length % 5);
//            console.log("$imgs.length / 5=" + $imgs.length / 5);
//            console.log("OldPage=" + OldPage);
            if ($imgs.length / 5 == OldPage)
                OldPage -= 1;
        }
        
        ToScrollablePage(OldPage);

//        console.log("OldPage=" + OldPage);
//        console.log("ImgNo=" + ImgNo);

        

        if (ImgNo > $imgs.length-1) 
            ImgNo = $imgs.length-1;
            
        if (ImgNo >= 0)
            $j( $imgs[ImgNo] ).click();    

//        console.log("ImgNo=" + ImgNo);
//        console.log("$imgs.length=" + $imgs.length);
    }



    function pickup_photo(url) {

    function GetScrollablePage() {
        var $div = $j("#display_grid_scrollable .items>div");
        var $items = $j("#display_grid_scrollable .items");
        var i_width = $j($div[0]).width();
        var i_left = parseInt($items.css("left"));
        var i_page = -1 * i_left / i_width;

        return (i_page);
    }

    function ToScrollablePage(i_page)
    {
        for (var i = 0; i < i_page; i ++)
        {
            $j(".next").click();
        }
    }
