# 推送 main 時自動部署 Worker（API + D1 綁定）
# GitHub Repo → Settings → Secrets → Actions：
#   CLOUDFLARE_API_TOKEN（必填，需含 Account:Workers Scripts:Edit 等）
# 若未建立 CLOUDFLARE_ACCOUNT_ID secret，部署步驟會先 unset，避免空字串導致 wrangler 失敗。
# 亦可改在 wrangler.toml 寫死 account_id = "..."

name: Deploy Worker to Cloudflare

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then unset CLOUDFLARE_ACCOUNT_ID; fi
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
