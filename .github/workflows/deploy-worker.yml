# 推送 main 時自動部署 Worker（API + D1 綁定）
#
# 必填：GitHub → Settings → Secrets and variables → Actions → New repository secret
#   Name  必須為：CLOUDFLARE_API_TOKEN
#   Value：Cloudflare Dashboard → My Profile → API Tokens → Create Token
#         可用範本「Edit Cloudflare Workers」或自訂含：Account Workers Scripts:Edit、
#         Account Workers KV Storage:Edit（若有用）、D1、R2 等與 wrangler.toml 相符之權限。
#
# 選填：CLOUDFLARE_ACCOUNT_ID（多帳號時；未建立時 workflow 會略過空值）

name: Deploy Worker to Cloudflare

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check CLOUDFLARE_API_TOKEN
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::未設定 GitHub Secret「CLOUDFLARE_API_TOKEN」。請至 Repository → Settings → Secrets and variables → Actions 新增同名 secret，值為 Cloudflare API Token。"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy Worker
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then unset CLOUDFLARE_ACCOUNT_ID; fi
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
