# 推送 main 時將 Vite 產物部署到 Cloudflare Pages（與 wrangler.toml / 本機 wrangler pages dev 一致）
#
# GitHub → Settings → Secrets and variables → Actions → New repository secret
#   CLOUDFLARE_API_TOKEN（必填）
#     Cloudflare → My Profile → API Tokens → Create Token
#     權限建議：Account → Cloudflare Pages → Edit；並含此專案用到的 D1 / R2 相關權限（與儀表板綁定一致即可）
#   CLOUDFLARE_ACCOUNT_ID（強烈建議）
#     Cloudflare 儀表板右側欄 Account ID
#
# Pages 專案名稱須與 Cloudflare 上專案一致（目前與 wrangler.toml 的 name 相同）
name: Deploy Pages to Cloudflare

on:
  push:
    branches: [main, master]

concurrency:
  group: cloudflare-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check CLOUDFLARE_API_TOKEN
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::未設定 GitHub Secret「CLOUDFLARE_API_TOKEN」。請至 Repository → Settings → Secrets and variables → Actions 新增。"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Pages
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then unset CLOUDFLARE_ACCOUNT_ID; fi
          npx wrangler pages deploy dist --project-name=erp-autoparts-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
